name: Unit tests

on:
  push:
  pull_request:

jobs:
  go-test:
    name: Go unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...
